<!DOCTYPE html>
<html>
<head>
  <title>Ticket Booking | EPIC EVENTS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="contact">
  <h1 class="heading"><span>ticket</span> booking</h1>

  <form>
    <div class="inputBox">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
    </div>

    <div class="inputBox">
      <input type="number" placeholder="Number of Tickets" required>
      <input type="date" required>
    </div>

    <textarea placeholder="Any Special Request"></textarea>

    <input type="submit" value="Book Ticket" class="btn">
  </form>
</section>

</body>
</html>
